reload_fixtures:
  name: Synchronize Light Manager Air
  description: Reload and synchronize the Light Manager Air configuration from the device. A notification with sync statistics is created after completion.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry ID. Leave empty when only one Light Manager Air is configured.
      required: false
      selector:
        text:

send_command:
  name: Send command
  description: Send a configured actuator command by zone, actuator and command name or index.
  fields:
    entry_id:
      name: Entry ID
      required: false
      selector:
        text:
    zone:
      name: Zone
      required: true
      selector:
        text:
    actuator:
      name: Actuator
      required: true
      selector:
        text:
    command:
      name: Command name
      required: false
      selector:
        text:
    command_index:
      name: Command index
      description: Zero-based fallback index when no command name is supplied.
      required: false
      selector:
        number:
          min: 0
          mode: box

send_raw_command:
  name: Send raw command
  description: Send a raw Light Manager Air /control cmd payload.
  fields:
    entry_id:
      name: Entry ID
      required: false
      selector:
        text:
    payload:
      name: Payload
      description: Example typ,it,did,0996,aid,215,acmd,0,seq,6
      required: true
      selector:
        text:

start_radio_learning:
  name: Start radio learning
  description: Wait for the next received Light Manager Air radio signal and show it as a notification.
  fields:
    entry_id:
      name: Entry ID
      required: false
      selector:
        text:
    timeout:
      name: Timeout
      description: Seconds to wait for a radio signal.
      required: false
      default: 30
      selector:
        number:
          min: 5
          max: 300
          unit_of_measurement: s
          mode: slider


show_radio_automation_yaml:
  name: Show radio automation YAML
  description: Create a persistent notification with ready-to-copy automation YAML for the last learned or supplied radio code.
  fields:
    code:
      name: Radio code
      description: Optional radio code. If omitted, the last learned radio signal is used.
      required: false
      selector:
        text:


export_xml:
  name: Export XML
  description: Load the current config.xml from the Light Manager Air and save it under /config/light_manager_air/debug_config.xml plus a timestamped snapshot.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry ID. Leave empty when only one Light Manager Air is configured.
      required: false
      selector:
        text:
